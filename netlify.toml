[build]
  base = "."
  command = "./publish.sh"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[edge_functions]]
  function = "inject-auth-config"
  path = "/*"
